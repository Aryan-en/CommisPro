<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommisPro — Enterprise Commission Platform</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/public/favicon.svg">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
              mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
            },
          }
        }
      }
    </script>

    <link rel="stylesheet" href="/index.css">
    <style>
      :root {
        --bg-base: #06090f;
        --bg-raised: #0b1121;
        --bg-surface: #0f1729;
        --bg-hover: #131d33;
        --border-subtle: rgba(148,163,184,0.06);
        --border-default: rgba(148,163,184,0.09);
        --border-accent: rgba(59,130,246,0.25);
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #475569;
        --accent-blue: #3b82f6;
        --accent-violet: #8b5cf6;
        --accent-emerald: #10b981;
        --accent-amber: #f59e0b;
        --accent-red: #ef4444;
        --accent-cyan: #06b6d4;
      }

      * { box-sizing: border-box; margin: 0; }

      body {
        background: var(--bg-base);
        color: var(--text-primary);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.12); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.2); }
      ::-webkit-scrollbar-corner { background: transparent; }

      /* ── Selection ── */
      ::selection { background: rgba(59,130,246,0.3); color: #f1f5f9; }

      /* ── Animations ── */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .fade-up { animation: fadeUp 0.3s cubic-bezier(0.16,1,0.3,1) forwards; }

      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      /* ── Card system ── */
      .card {
        background: var(--bg-raised);
        border: 1px solid var(--border-subtle);
        border-radius: 16px;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .card:hover {
        border-color: var(--border-default);
      }
      .card-inner {
        background: var(--bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
      }

      /* ── Gradient accents ── */
      .gradient-blue { background: linear-gradient(135deg, #1d4ed8, #2563eb); }
      .gradient-violet { background: linear-gradient(135deg, #6d28d9, #7c3aed); }
      .gradient-emerald { background: linear-gradient(135deg, #047857, #059669); }

      .glow-blue { box-shadow: 0 0 40px -8px rgba(59,130,246,0.2), 0 0 80px -16px rgba(59,130,246,0.1); }
      .glow-violet { box-shadow: 0 0 40px -8px rgba(139,92,246,0.2), 0 0 80px -16px rgba(139,92,246,0.1); }

      /* ── Dot grid background for headers ── */
      .dot-grid {
        background-image: radial-gradient(rgba(148,163,184,0.06) 1px, transparent 1px);
        background-size: 20px 20px;
      }

      /* ── Inputs ── */
      input[type=date], input[type=text], select, textarea {
        background: var(--bg-surface);
        border: 1px solid var(--border-default);
        color: var(--text-secondary);
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 13px;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      input[type=date]:focus, input[type=text]:focus, select:focus, textarea:focus {
        border-color: var(--accent-blue);
        box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
      }

      /* ── Range ── */
      input[type=range] { accent-color: var(--accent-blue); }
      input[type=range]::-webkit-slider-track { background: rgba(148,163,184,0.08); height: 3px; border-radius: 2px; }
      input[type=range]::-webkit-slider-thumb { border-radius: 50%; }

      /* ── Button base ── */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 8px 16px;
        border-radius: 10px;
        font-size: 12px;
        font-weight: 600;
        transition: all 0.15s;
        cursor: pointer;
        border: 1px solid transparent;
        white-space: nowrap;
      }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .btn-primary {
        background: linear-gradient(135deg, #2563eb, #3b82f6);
        color: white;
        border-color: rgba(59,130,246,0.3);
        box-shadow: 0 1px 2px rgba(0,0,0,0.3), 0 0 20px -6px rgba(59,130,246,0.3);
      }
      .btn-primary:hover:not(:disabled) {
        box-shadow: 0 2px 8px rgba(0,0,0,0.4), 0 0 30px -4px rgba(59,130,246,0.4);
        transform: translateY(-1px);
      }

      .btn-ghost {
        background: transparent;
        color: var(--text-secondary);
        border-color: var(--border-default);
      }
      .btn-ghost:hover:not(:disabled) {
        background: var(--bg-hover);
        color: var(--text-primary);
        border-color: rgba(148,163,184,0.15);
      }

      /* ── Badge ── */
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 9999px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        border: 1px solid transparent;
      }

      /* ── Loading skeleton ── */
      .skeleton {
        background: linear-gradient(90deg, var(--bg-surface) 25%, var(--bg-hover) 50%, var(--bg-surface) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 8px;
      }

      /* ── Table row hover ── */
      .table-row-hover:hover {
        background: rgba(59,130,246,0.04) !important;
      }

      /* ── Label ── */
      .label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-muted);
      }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="root" class="h-full"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
